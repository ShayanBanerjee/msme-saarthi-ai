name: msme-saarthi-local

services:
  postgres:
    image: postgres:16.14-alpine3.23
    environment:
      POSTGRES_DB: msme_saarthi
      POSTGRES_USER: msme_saarthi
      POSTGRES_PASSWORD: local-development-only
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msme_saarthi -d msme_saarthi"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4.9-alpine3.21
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:3.6.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
  opensearch-data:
