[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "msme-saarthi-eligibility-engine"
version = "0.1.0"
description = "Deterministic eligibility evaluation for MSME Saarthi AI"
requires-python = ">=3.12,<3.14"
dependencies = ["pydantic>=2.10,<3.0"]

[project.optional-dependencies]
dev = [
  "mypy>=1.15,<2.0",
  "pytest>=8.3,<9.0",
  "ruff>=0.9,<1.0",
]

[tool.setuptools.packages.find]
include = ["eligibility_engine*"]

[tool.pytest.ini_options]
addopts = "-ra --strict-config --strict-markers"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
files = ["eligibility_engine", "tests"]

